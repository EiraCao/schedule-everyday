# schedule-manager 配置模板

version: "1.0"
created_at: "YYYY-MM-DD"

# Onboarding 状态（断点续传）
onboarding_status: "completed"  # pending_step3 / pending_step4 / pending_step5 / completed

# 分类方式: moscow / 1-3-5 / eisenhower
classification: "moscow"

# 对齐时间设置
daily_sync:
  enabled: true
  time: "21:30"      # HH:MM 格式

weekly_sync:
  enabled: true
  day: "sunday"      # sunday/monday/...
  time: "19:00"

# 日历配置（飞书）
calendar:
  enabled: true
  color_mapping:     # 根据分类方式配置颜色
    # MoSCoW 示例
    "Must": -562844
    "Should": -30720
    "Could": -13318364

# 中长期目标
goals:
  - name: "目标名称"
    type: "excel"    # excel（精进型）/ pass（及格线）
    progress: "刚开始"

# 存储设置
storage:
  # 主存储：飞书（推荐）
  feishu_doc_token: null      # 事项清单文档 token
  feishu_calendar_id: null    # 日历 ID

  # 备选：本地文件（OpenClaw 环境用 workspace 下的路径）
  local_path: "~/.openclaw/workspace/skills/schedule-manager/tasks.md"
